# =============================================================================
# Dex — STANDALONE I-SPI scope
#
# Identical to the repo's dex.yml except the staticClient redirectURIs are
# trimmed to only what a standalone I-SPI install needs:
#   - the whoami callback (kept so you can verify the auth chain before I-SPI)
#   - the two I-SPI URIs
# The two Data Portal redirect URIs have been removed.
#
# Air-gap note: the init container downloads the customized Dex web theme
# (web.zip) from GitHub on first start. For an offline install, pre-seed the
# `dex` PVC with the unpacked `web/` directory at /var/dex/web first.
# =============================================================================
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dex
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1G
---
apiVersion: v1
kind: Secret
metadata:
  name: dex
  labels:
    app: dex
stringData:
  config.yml: |
    issuer: https://IMMUNOPLEX_HOSTNAME/dex
    storage:
      type: sqlite3
      config:
        file: /var/dex/dex.db
    web:
      http: 0.0.0.0:5556
    grpc:
      addr: 0.0.0.0:5557
      reflection: true
    staticClients:
    - name: 'ImmunoPlex'
      id: IMMUNOPLEX_OAUTH_CLIENT_ID
      secret: IMMUNOPLEX_OAUTH_SECRET
      redirectURIs:
      - 'https://IMMUNOPLEX_HOSTNAME/whoami/oauth2/callback'
      - 'https://IMMUNOPLEX_HOSTNAME/i-spi/'
      - 'https://IMMUNOPLEX_HOSTNAME/i-spi/callback'
    enablePasswordDB: true
    oauth2:
      passwordConnector: local
      skipApprovalScreen: true
    frontend:
      dir: /var/dex/web
      extra:
        signup_url: "/dex/account/signup"
        forgot_password_url: "/dex/account/forgot_password"
---
apiVersion: v1
kind: Service
metadata:
  name: dex
  labels:
    app: dex
spec:
  type: ClusterIP
  ports:
  - port: 5556
    name: dex
  - port: 5557
    name: grpc
  selector:
    app: dex
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
   name: dex
   annotations:
     cert-manager.io/cluster-issuer: intermediate-ca1-issuer
     cert-manager.io/common-name: "IMMUNOPLEX_HOSTNAME"
     kubernetes.io/ingress.class: traefik
     traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  rules:
  - http:
      paths:
      - path: /dex
        pathType: Prefix
        backend:
          service:
            name: dex
            port:
              number: 5556
  tls:
  - hosts:
    - IMMUNOPLEX_HOSTNAME
    secretName: cert-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex
  labels:
    app: dex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dex
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: dex
    spec:
      imagePullSecrets:
      - name: regcred
      initContainers:
      - name: init-templates
        image: busybox
        command:
          - 'sh'
          - '-c'
          - |
            if [ ! -d /var/www/web ]; then
              cd /var/dex
              wget https://github.com/immunoplex/deployment/raw/refs/heads/main/templates/web.zip
              unzip -q web.zip
              rm web.zip
            else
              echo "/var/www/web already exists, skipping download"
            fi
        volumeMounts:
        - name: storage
          mountPath: /var/dex
      containers:
      - image: dexidp/dex:v2.44.0-alpine
        imagePullPolicy: Always
        name: dex
        ports:
        - containerPort: 5556
          name: dex
        - containerPort: 5557
          name: grpc
        volumeMounts:
        - name: dex-config
          mountPath: /etc/dex/config.docker.yaml
          subPath: config.yml
        - name: storage
          mountPath: /var/dex
      volumes:
      - name: dex-config
        secret:
          secretName: dex
      - name: storage
        persistentVolumeClaim:
          claimName: dex
---
apiVersion: v1
kind: Service
metadata:
  name: dex-account
  labels:
    app: dex-account
spec:
  type: ClusterIP
  ports:
  - port: 8080
    name: dex-account
  selector:
    app: dex-account
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dex-account
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: dex-account-stripprefix@file
    cert-manager.io/cluster-issuer: intermediate-ca1-issuer
    cert-manager.io/common-name: "IMMUNOPLEX_HOSTNAME"
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  rules:
  - http:
      paths:
      - path: /dex/account
        pathType: Prefix
        backend:
          service:
            name: dex-account
            port:
              number: 8080
  tls:
  - hosts:
    - IMMUNOPLEX_HOSTNAME
    secretName: cert-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex-account
  labels:
    app: dex-account
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dex-account
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: dex-account
    spec:
      containers:
      - image: ghcr.io/immunoplex/signup:main
        imagePullPolicy: Always
        name: dex-account
        env:
        - name: REDIRECT_URL_AFTER_SIGNUP
          value: "https://IMMUNOPLEX_HOSTNAME/whoami"
        - name: GRPC_ADDRESS
          value: "dex:5557"
        ports:
        - containerPort: 8080
          name: dex-account
